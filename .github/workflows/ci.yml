name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Root crate: the PyO3 extension (dedup_core) that dedup_gui.py prefers.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Rust is preinstalled on ubuntu-latest; just ensure the lint components.
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --check
      # --lib avoids building a test-harness binary, which a pyo3 extension-module
      # crate cannot link (libpython is resolved by the host at runtime, not built).
      - run: cargo clippy --lib -- -D warnings
      - run: cargo build --release --lib

  # Tauri v2 app crate (src-tauri) — the current GUI. Shares the algorithm code.
  tauri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Tauri links these system libraries even for a --lib test binary.
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libxdo-dev
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --lib -- -D warnings
        working-directory: src-tauri
      # --lib only: the binary's generate_context!() needs a built frontend; the
      # library holds the algorithm + security tests we want to gate on.
      - run: cargo test --lib
        working-directory: src-tauri

  # Python fallback engine (dedup_engine) + security tests.
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
          cache: pip
      # The test suite targets the pure-Python fallback engine (dedup_engine),
      # so only the fallback deps are needed — not the Rust extension.
      - run: pip install -r requirements.txt pytest
      - run: pytest -q
